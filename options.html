<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System Notification Placement Options | Excelerator Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/excelerator.css" />
    <link rel="stylesheet" href="css/notification-placement.css" />
  </head>
  <body class="opts-page" data-options-landing>
    <header class="opts-hero">
      <div class="opts-hero__inner">
        <img
          class="opts-hero__brand"
          src="assets/images/excelerator-logo.png"
          alt="Excelerator"
        />
        <h1>System notification placement</h1>
        <p>
          Choose a placement direction to preview across the Solutions, Parts,
          Coverage, and Connectivity homepages. Your selection is saved for this
          browser session and highlighted when you return here.
        </p>
      </div>
    </header>

    <main class="opts-grid-wrap">
      <div class="opts-grid" id="opts-grid" role="list"></div>
    </main>

    <script src="js/notification-placement.js"></script>
    <script>
      (function () {
        var api = window.ExNoticePlacement;
        var grid = document.getElementById("opts-grid");
        var selected = api.get();

        api.OPTIONS.forEach(function (opt) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "opts-card" + (selected === opt.id ? " is-selected" : "");
          btn.setAttribute("role", "listitem");
          btn.innerHTML =
            '<span class="opts-card__label">' +
            opt.label +
            "</span>" +
            '<h2 class="opts-card__title">' +
            opt.name +
            "</h2>" +
            '<p class="opts-card__desc">' +
            opt.desc +
            "</p>" +
            '<span class="opts-card__selected"><i class="fas fa-check-circle" aria-hidden="true"></i> Currently selected</span>';

          btn.addEventListener("click", function () {
            api.set(opt.id);
            window.location.href = "index.html";
          });

          grid.appendChild(btn);
        });
      })();
    </script>
  </body>
</html>
