<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request declined</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/excelerator.css" />
    <link rel="stylesheet" href="../../css/product-header.css" />
    <link rel="stylesheet" href="../../css/parts.css" />
    <link rel="stylesheet" href="../../css/dealer-access.css" />
  </head>
  <body class="da-page da-page--site" data-dealer-access data-da-root="../..">
    <a class="da-back" href="../../index.html"
      ><i class="fas fa-th-large" aria-hidden="true"></i
      ><span>All features</span></a
    >

    <div data-da-site-header></div>

    <div class="da-shell">
      <div class="da-shell__card">
        <main class="da-main da-main--wide">
          <div class="da-complete da-complete--hero">
            <div
              class="da-complete__icon da-complete__icon--danger"
              aria-hidden="true"
            >
              <i class="fas fa-xmark"></i>
            </div>
            <h1 class="da-complete__title">Request declined</h1>
            <div class="da-complete__panel da-complete__panel--danger">
              <p class="da-complete__body">
                You’ve declined
                <span class="da-lead__dealer">Fort Mill Freightliner</span>’s
                request for account access. No changes have been made to your
                account. You don’t need to do anything else.
              </p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../js/dealer-access-header.js"></script>
  </body>
</html>
